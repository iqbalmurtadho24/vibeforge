openapi: 3.0.3
info:
  title: Vibeforge App API
  description: |
    Vibeforge - API Documentation

    ## Overview
    This API provides endpoints for authentication, content management,
    and application operations.

    ## Authentication
    All authenticated endpoints require a valid session cookie.
    Session is established via POST /core/router.php with module=auth&action=login.

    ## Rate Limiting
    Fixed-window rate limiting keyed by IP + email combination
    (`RATE_LIMIT_MAX_ATTEMPTS` per `RATE_LIMIT_WINDOW` seconds, default
    5/300s - see `core/ratelimit.php`). Returns HTTP 429 once the window's
    attempt count is exceeded. No `Retry-After` header is currently sent.

    ## Response Format
    All JSON responses follow this format:
    ```json
    {
      "success": true|false,
      "error": "Human-readable error message (only when success=false)"
    }
    ```
    Successful responses may include additional fields specific to the
    action (e.g. `dashboard_url` on login) - see per-endpoint schemas below.

  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: /
    description: Current server

tags:
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: User management operations
  - name: Settings
    description: User settings and preferences

paths:
  /core/router.php:
    post:
      summary: Router endpoint
      description: |
        Single endpoint for all module actions. Module and action
        are specified in POST body. All requests require CSRF token
        for state-changing operations.

      tags:
        - Auth

      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                module:
                  type: string
                  enum:
                    - auth
                    - users
                    - settings
                    - content
                    - reports
                  description: |
                    The module to invoke. Only `auth` (actions: `login`,
                    `register`) is implemented so far, backed by
                    `modules/auth/*.php`. The other values are reserved
                    naming convention for future modules and are not
                    wired up yet.
                action:
                  type: string
                  description: The action within the module
                csrf_token:
                  type: string
                  description: CSRF token for authenticated actions
              required:
                - module
                - action

      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/RegisterResponse'
                  - $ref: '#/components/schemas/ApiResponse'
            text/html:
              description: Module render HTML (for action=render)
        '429':
          description: |
            Rate limited (see `isRateLimited()` in core/ratelimit.php).
            No `Retry-After` header is sent yet - not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /logout/:
    get:
      summary: Logout
      description: |
        Destroys the session (and any remember-me token/cookie) then
        redirects to the landing page. This is a plain shell entry point
        (`public/logout/index.php`), not a `core/router.php` module
        action - GET, not POST, and renders no HTML (see CLAUDE.md
        Section 12f).
      tags:
        - Auth
      security:
        - session: []
      responses:
        '302':
          description: Session destroyed, redirected to `/`
          headers:
            Location:
              schema:
                type: string
                example: /
            Set-Cookie:
              description: Session cookie and remember_token cookie cleared

components:
  schemas:
    LoginResponse:
      type: object
      description: Actual shape returned by modules/auth/login.php
      properties:
        success:
          type: boolean
          example: true
        dashboard_url:
          type: string
          format: uri
          description: |
            Role -> shell mapping from getDashboardUrl() (core/session.php),
            e.g. /manajemen/, /admin/, /client/. Only present on success.
          example: "/client/"

    RegisterResponse:
      type: object
      description: Actual shape returned by modules/auth/register.php
      properties:
        success:
          type: boolean
          example: true

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Response payload

    ErrorResponse:
      type: object
      description: |
        Actual error shape used by modules/auth/*.php and core/router.php
        (e.g. invalid CSRF, rate limited, invalid credentials).
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Email atau password salah"

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [manajemen, admin, client]
        theme_preference:
          type: string
          enum: [dark, light]
          default: dark
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreate:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        name:
          type: string
          minLength: 2
          maxLength: 100
        role:
          type: string
          enum: [client]
          default: client

  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: PHP session cookie

security:
  - session: []
