<!DOCTYPE html>
<html>
<head>
    <title>Flag Assets</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1d; color: white; }
        .flag { display: inline-block; margin: 20px; text-align: center; }
        .flag img { width: 150px; height: 100px; border: 2px solid #333; border-radius: 4px; }
        .flag p { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Flag Assets for i18n</h1>
    <div class="flag">
        <img src="id.svg" alt="Indonesia">
        <p>Indonesia (id)</p>
    </div>
    <div class="flag">
        <img src="en.svg" alt="English">
        <p>English (en)</p>
    </div>
    <div class="flag">
        <img src="ar.svg" alt="Arabic">
        <p>العربية (ar)</p>
    </div>
</body>
</html>
